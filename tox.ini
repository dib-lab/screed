[tox]
envlist = py311, py312, py313, py314
minversion = 3.12
isolated_build = true
skip_missing_interpreters = true

[testenv]
passenv =
  CI
  GITHUB_ACTION
  GITHUB_REF
  GITHUB_HEAD_REF
  GITHUB_RUN_ID
  GITHUB_SHA
  GITHUB_REPOSITORY
allowlist_externals = make
commands =
  make install-dependencies
  pytest --cov -m 'not known_failing' --cov-report xml
  make pep8
  make doc
deps =
  pytest
  pytest-cov
  sphinx

[gh-actions]
python =
  3.11: py311
  3.12: py312
  3.13: py313
  3.14: py314
